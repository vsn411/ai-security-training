name: AI Security Eval Suite

on:
  pull_request:
    paths:
      - 'week1*/**.py'
      - 'week1*/tests/**.yaml'
      - '0*/SKILL.md'
      - '07-agent-development/**/SKILL.md'
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6am — weekly regression run
  workflow_dispatch:        # Allow manual trigger

jobs:
  # ─── Job 1: Week 13 — Simple Agent Eval ─────────────────────────────────
  eval-week13:
    name: "Week 13 — Simple Agent Security Eval"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r week13-simple-agent/requirements.txt

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma2

      - name: Start Week 13 API
        run: |
          cd week13-simple-agent
          uvicorn api:app --port 8000 &
          sleep 5
        
      - name: Run promptfoo eval
        run: |
          cd week13-simple-agent
          promptfoo eval -c tests/promptfoo-eval.yaml \
            --output ../eval-results-week13.json \
            --no-cache

      - name: Check gate — safety and injection must pass
        run: python3 .github/scripts/check_eval_gate.py eval-results-week13.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-week13-${{ github.run_number }}
          path: eval-results-week13.json

  # ─── Job 2: Week 14 — RAG Agent Eval ────────────────────────────────────
  eval-week14:
    name: "Week 14 — RAG Agent Security Eval"
    runs-on: ubuntu-latest
    needs: eval-week13

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r week14-rag-agent/requirements.txt

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma2

      - name: Ingest sample documents
        run: |
          cd week14-rag-agent
          python ingest.py sample_docs/

      - name: Start Week 14 API
        run: |
          cd week14-rag-agent
          uvicorn api:app --port 8000 &
          sleep 5

      - name: Run promptfoo eval
        run: |
          cd week14-rag-agent
          promptfoo eval -c tests/promptfoo-rag-eval.yaml \
            --output ../eval-results-week14.json \
            --no-cache

      - name: Check release gate
        run: python3 .github/scripts/check_eval_gate.py eval-results-week14.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-week14-${{ github.run_number }}
          path: eval-results-week14.json

  # ─── Job 3: garak vulnerability scan (weekly only) ───────────────────────
  garak-scan:
    name: "garak — LLM Vulnerability Scan"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install garak
        run: pip install garak

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          sleep 8
          ollama pull gemma2

      - name: Run garak probes
        run: |
          garak --model_type ollama --model_name gemma2 \
            --probes promptinject,jailbreak,leakage \
            --report_prefix garak-weekly \
            --format jsonl
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: garak-scan-${{ github.run_number }}
          path: garak-weekly*.jsonl

  # ─── Job 4: PR Comment ───────────────────────────────────────────────────
  pr-comment:
    name: "Post results to PR"
    runs-on: ubuntu-latest
    needs: [eval-week13, eval-week14]
    if: github.event_name == 'pull_request' && always()

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: eval-results-*
          merge-multiple: true

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🔒 AI Security Eval Results\n\n';

            for (const week of ['week13', 'week14']) {
              const file = `eval-results-${week}.json`;
              if (fs.existsSync(file)) {
                const r = JSON.parse(fs.readFileSync(file));
                const total = r.stats?.totalTests || 0;
                const passed = r.stats?.passedTests || 0;
                const pct = total > 0 ? (passed/total*100).toFixed(1) : 0;
                const icon = pct >= 90 ? '✅' : pct >= 70 ? '⚠️' : '❌';
                summary += `${icon} **${week}**: ${passed}/${total} passed (${pct}%)\n`;
              }
            }

            summary += '\nSee workflow artifacts for full reports.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
